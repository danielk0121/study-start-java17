plugins {
    id 'java'
    id 'org.springframework.boot' version '2.7.18' // Spring Boot 2 마지막 버전
    id 'io.spring.dependency-management' version '1.0.15.RELEASE'
}

group = 'dev.danielk'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    // 임베디드 Redis — Docker 없이 테스트용 Redis 서버를 JVM 안에서 실행
    // Redis 7.x 기반이므로 Streams(XADD/XGROUP/XREADGROUP/XACK) 완전 지원
    testImplementation 'com.github.codemonstur:embedded-redis:1.4.3'

    implementation 'org.mapstruct:mapstruct:1.5.5.Final'

    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    testCompileOnly 'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'

    // MapStruct Processor & Binding
    // 순서 중요: lombok-mapstruct-binding이 반드시 포함되어야 함
    annotationProcessor 'org.projectlombok:lombok-mapstruct-binding:0.2.0'
    annotationProcessor 'org.mapstruct:mapstruct-processor:1.5.5.Final'
}

tasks.named('test') {
    useJUnitPlatform()
}
