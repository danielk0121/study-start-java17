        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/products-id1372543473'
            examples:
              products-update:
                value: |-
                  {
                    "name" : "MacBook Pro M3",
                    "price" : 2500000,
                    "stock" : 20,
                    "category" : "ELECTRONICS"
