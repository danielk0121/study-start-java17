openapi: 3.0.1
info:
  title: Start Java 17 API
  description: Java 17 + Redis Streams 학습 프로젝트 API 명세
  version: 0.0.1
servers:
- url: http://localhost:8080
tags: []
paths:
  /members:
    get:
      tags:
      - members
      operationId: members-find-all
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
              examples:
                members-find-all:
                  value: |-
                    [ {
                      "id" : 1,
                      "email" : "user@example.com",
                      "name" : "홍길동",
                      "role" : "USER"
                    }, {
                      "id" : 2,
                      "email" : "admin@example.com",
                      "name" : "관리자",
                      "role" : "ADMIN"
                    } ]
    post:
      tags:
      - members
      operationId: members-join
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberJoinRequest'
            examples:
              members-join:
                value: |-
                  {
                    "email" : "user@example.com",
                    "name" : "홍길동"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
              examples:
                members-join:
                  value: |-
                    {
                      "id" : 1,
                      "email" : "user@example.com",
                      "name" : "홍길동",
                      "role" : "USER"
                    }
  /members/{id}:
    get:
      tags:
      - members
      operationId: members-find-by-id
      parameters:
      - name: id
        in: path
        description: 회원 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
              examples:
                members-find-by-id:
                  value: |-
                    {
                      "id" : 1,
                      "email" : "user@example.com",
                      "name" : "홍길동",
                      "role" : "USER"
                    }
    put:
      tags:
      - members
      operationId: members-update
      parameters:
      - name: id
        in: path
        description: 회원 ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberUpdateRequest'
            examples:
              members-update:
                value: |-
                  {
                    "name" : "홍길순"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
              examples:
                members-update:
                  value: |-
                    {
                      "id" : 1,
                      "email" : "user@example.com",
                      "name" : "홍길순",
                      "role" : "USER"
                    }
    delete:
      tags:
      - members
      operationId: members-delete
      parameters:
      - name: id
        in: path
        description: 회원 ID
        required: true
        schema:
          type: string
      responses:
        "204":
          description: "204"
  /orders:
    get:
      tags:
      - orders
      operationId: orders-find-all
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              examples:
                orders-find-all:
                  value: |-
                    [ {
                      "id" : 1,
                      "memberId" : 1,
                      "items" : [ {
                        "productId" : 1,
                        "quantity" : 2
                      }, {
                        "productId" : 2,
                        "quantity" : 1
                      } ],
                      "status" : "PENDING",
                      "createdAt" : "2026-03-16T12:00"
                    }, {
                      "id" : 2,
                      "memberId" : 2,
                      "items" : [ {
                        "productId" : 3,
                        "quantity" : 5
                      } ],
                      "status" : "CONFIRMED",
                      "createdAt" : "2026-03-16T12:00"
                    } ]
    post:
      tags:
      - orders
      operationId: orders-place
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderPlaceRequest'
            examples:
              orders-place:
                value: |-
                  {
                    "memberId" : 1,
                    "items" : [ {
                      "productId" : 1,
                      "quantity" : 2
                    }, {
                      "productId" : 2,
                      "quantity" : 1
                    } ]
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              examples:
                orders-place:
                  value: |-
                    {
                      "id" : 1,
                      "memberId" : 1,
                      "items" : [ {
                        "productId" : 1,
                        "quantity" : 2
                      }, {
                        "productId" : 2,
                        "quantity" : 1
                      } ],
                      "status" : "PENDING",
                      "createdAt" : "2026-03-16T12:00"
                    }
  /orders/{id}:
    get:
      tags:
      - orders
      operationId: orders-find-by-id
      parameters:
      - name: id
        in: path
        description: 주문 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              examples:
                orders-find-by-id:
                  value: |-
                    {
                      "id" : 1,
                      "memberId" : 1,
                      "items" : [ {
                        "productId" : 1,
                        "quantity" : 2
                      }, {
                        "productId" : 2,
                        "quantity" : 1
                      } ],
                      "status" : "PENDING",
                      "createdAt" : "2026-03-16T12:00"
                    }
    delete:
      tags:
      - orders
      operationId: orders-delete
      parameters:
      - name: id
        in: path
        description: 주문 ID
        required: true
        schema:
          type: string
      responses:
        "204":
          description: "204"
  /orders/{id}/cancel:
    patch:
      tags:
      - orders
      operationId: orders-cancel
      parameters:
      - name: id
        in: path
        description: 주문 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              examples:
                orders-cancel:
                  value: |-
                    {
                      "id" : 1,
                      "memberId" : 1,
                      "items" : [ {
                        "productId" : 1,
                        "quantity" : 2
                      }, {
                        "productId" : 2,
                        "quantity" : 1
                      } ],
                      "status" : "CANCELLED",
                      "createdAt" : "2026-03-16T12:00"
                    }
  /products:
    get:
      tags:
      - products
      operationId: products-find-all
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
              examples:
                products-find-all:
                  value: |-
                    [ {
                      "id" : 1,
                      "name" : "MacBook Pro",
                      "price" : 2000000,
                      "stock" : 10,
                      "category" : "ELECTRONICS"
                    }, {
                      "id" : 2,
                      "name" : "청바지",
                      "price" : 50000,
                      "stock" : 100,
                      "category" : "CLOTHING"
                    } ]
    post:
      tags:
      - products
      operationId: products-register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRegisterRequest'
            examples:
              products-register:
                value: |-
                  {
                    "name" : "MacBook Pro",
                    "price" : 2000000,
                    "stock" : 10,
                    "category" : "ELECTRONICS"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
              examples:
                products-register:
                  value: |-
                    {
                      "id" : 1,
                      "name" : "MacBook Pro",
                      "price" : 2000000,
                      "stock" : 10,
                      "category" : "ELECTRONICS"
                    }
  /products/{id}:
    get:
      tags:
      - products
      operationId: products-find-by-id
      parameters:
      - name: id
        in: path
        description: 상품 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
              examples:
                products-find-by-id:
                  value: |-
                    {
                      "id" : 1,
                      "name" : "MacBook Pro",
                      "price" : 2000000,
                      "stock" : 10,
                      "category" : "ELECTRONICS"
                    }
    put:
      tags:
      - products
      operationId: products-update
      parameters:
      - name: id
        in: path
        description: 상품 ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
            examples:
              products-update:
                value: |-
                  {
                    "name" : "MacBook Pro M3",
                    "price" : 2500000,
                    "stock" : 20,
                    "category" : "ELECTRONICS"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
              examples:
                products-update:
                  value: |-
                    {
                      "id" : 1,
                      "name" : "MacBook Pro M3",
                      "price" : 2500000,
                      "stock" : 20,
                      "category" : "ELECTRONICS"
                    }
    delete:
      tags:
      - products
      operationId: products-delete
      parameters:
      - name: id
        in: path
        description: 상품 ID
        required: true
        schema:
          type: string
      responses:
        "204":
          description: "204"
components:
  schemas:
    MemberUpdateRequest:
      title: MemberUpdateRequest
      type: object
      properties:
        name:
          type: string
          description: 변경할 이름
    MemberResponse:
      title: MemberResponse
      type: array
      items:
        type: object
        properties:
          role:
            type: string
            description: 권한
          name:
            type: string
            description: 이름
          id:
            type: number
            description: 회원 ID
          email:
            type: string
            description: 이메일
    ProductUpdateRequest:
      title: ProductUpdateRequest
      type: object
      properties:
        price:
          type: number
          description: 가격
        name:
          type: string
          description: 상품명
        category:
          type: string
          description: 카테고리
        stock:
          type: number
          description: 재고 수량
    OrderResponse:
      title: OrderResponse
      type: object
      properties:
        createdAt:
          type: string
          description: 주문 일시
        id:
          type: number
          description: 주문 ID
        items:
          type: array
          description: 주문 항목 목록
          items:
            type: object
            properties:
              quantity:
                type: number
                description: 주문 수량
              productId:
                type: number
                description: 상품 ID
        status:
          type: string
          description: 취소된 주문 상태 (CANCELLED)
        memberId:
          type: number
          description: 회원 ID
    MemberJoinRequest:
      title: MemberJoinRequest
      type: object
      properties:
        name:
          type: string
          description: 회원 이름
        email:
          type: string
          description: 이메일 (로그인 ID)
    ProductRegisterRequest:
      title: ProductRegisterRequest
      type: object
      properties:
        price:
          type: number
          description: 가격
        name:
          type: string
          description: 상품명
        category:
          type: string
          description: 카테고리 (ELECTRONICS | CLOTHING | FOOD | BOOKS | ETC)
        stock:
          type: number
          description: 초기 재고 수량
    ProductResponse:
      title: ProductResponse
      type: object
      properties:
        price:
          type: number
          description: 가격
        name:
          type: string
          description: 상품명
        id:
          type: number
          description: 상품 ID
        category:
          type: string
          description: 카테고리
        stock:
          type: number
          description: 재고 수량
    OrderPlaceRequest:
      title: OrderPlaceRequest
      type: object
      properties:
        items:
          type: array
          description: 주문 항목 목록 (1개 이상)
          items:
            type: object
            properties:
              quantity:
                type: number
                description: 주문 수량 (1 이상)
              productId:
                type: number
                description: 상품 ID
        memberId:
          type: number
          description: 회원 ID
