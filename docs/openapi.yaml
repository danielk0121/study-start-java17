openapi: 3.0.1
info:
  title: Start Java 17 API
  description: Java 17 + Redis Streams 학습 프로젝트 API 명세
  version: 0.0.1
servers:
- url: http://localhost:8080
tags: []
paths:
  /members:
    get:
      tags:
      - members
      operationId: members-find-all
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/members1610948347'
              examples:
                members-find-all:
                  value: |-
                    [ {
                      "id" : 1,
                      "email" : "user@example.com",
                      "name" : "홍길동",
                      "role" : "USER"
                    }, {
                      "id" : 2,
                      "email" : "admin@example.com",
                      "name" : "관리자",
                      "role" : "ADMIN"
                    } ]
    post:
      tags:
      - members
      operationId: members-join
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/members54192698'
            examples:
              members-join:
                value: |-
                  {
                    "email" : "user@example.com",
                    "name" : "홍길동"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/members-417933837'
              examples:
                members-join:
                  value: |-
                    {
                      "id" : 1,
                      "email" : "user@example.com",
                      "name" : "홍길동",
                      "role" : "USER"
                    }
  /members/{id}:
    get:
      tags:
      - members
      operationId: members-find-by-id
      parameters:
      - name: id
        in: path
        description: 회원 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/members-id-1168164564'
              examples:
                members-find-by-id:
                  value: |-
                    {
                      "id" : 1,
                      "email" : "user@example.com",
                      "name" : "홍길동",
                      "role" : "USER"
                    }
    put:
      tags:
      - members
      operationId: members-update
      parameters:
      - name: id
        in: path
        description: 회원 ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/members-id-109134508'
            examples:
              members-update:
                value: |-
                  {
                    "name" : "홍길순"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/members-id-607744917'
              examples:
                members-update:
                  value: |-
                    {
                      "id" : 1,
                      "email" : "user@example.com",
                      "name" : "홍길순",
                      "role" : "USER"
                    }
    delete:
      tags:
      - members
      operationId: members-delete
      parameters:
      - name: id
        in: path
        description: 회원 ID
        required: true
        schema:
          type: string
      responses:
        "204":
          description: "204"
  /orders:
    get:
      tags:
      - orders
      operationId: orders-find-all
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/orders826063332'
              examples:
                orders-find-all:
                  value: |-
                    [ {
                      "id" : 1,
                      "memberId" : 1,
                      "productId" : 1,
                      "quantity" : 2,
                      "status" : "PENDING",
                      "createdAt" : "2026-03-16T12:00"
                    }, {
                      "id" : 2,
                      "memberId" : 2,
                      "productId" : 2,
                      "quantity" : 1,
                      "status" : "CONFIRMED",
                      "createdAt" : "2026-03-16T12:00"
                    } ]
    post:
      tags:
      - orders
      operationId: orders-place
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/orders-1417073637'
            examples:
              orders-place:
                value: |-
                  {
                    "memberId" : 1,
                    "productId" : 1,
                    "quantity" : 2
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/orders639064753'
              examples:
                orders-place:
                  value: |-
                    {
                      "id" : 1,
                      "memberId" : 1,
                      "productId" : 1,
                      "quantity" : 2,
                      "status" : "PENDING",
                      "createdAt" : "2026-03-16T12:00"
                    }
