server:
  port: 8000

spring:
  main:
    web-application-type: servlet
  zipkin:
    base-url: http://localhost:9411
    sender:
      type: web
  sleuth:
    sampler:
      probability: 1.0   # 로컬: 전량 수집. 운영에서는 0.1 권장

feign:
  member-service:
    url: http://localhost:8080
  order-service:
    url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health
