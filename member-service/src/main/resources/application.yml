server:
  port: 8080

spring:
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: false

jwt:
  secret: study-start-java17-secret-key-for-jwt-token-generation

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, caches, metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: member-service
