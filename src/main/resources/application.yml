spring:
  datasource:
    url: jdbc:mysql://localhost:3306/start_java17?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&connectionCollation=utf8mb4_unicode_ci
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5        # 최대 커넥션 수
      minimum-idle: 2             # 최소 유휴 커넥션 수
      connection-timeout: 30000   # 커넥션 획득 대기 최대 시간 (ms)
      idle-timeout: 600000        # 유휴 커넥션 유지 시간 (ms, 10분)
      max-lifetime: 1800000       # 커넥션 최대 수명 (ms, 30분)

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  redis:
    host: localhost
    port: 6379

# Redis Streams 설정
redis:
  stream:
    key: order-stream
    consumer-group: order-group
    consumer-name: consumer-1

# 로그 설정은 logback-spring.xml에서 프로파일별로 관리
# - local/default : Spring Boot 기본 포맷 + traceId/spanId
# - dev/prod      : JSON 출력 (logstash-logback-encoder)
