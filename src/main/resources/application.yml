spring:
  profiles:
    active: local  # 기본 프로파일: local (운영 시 환경변수 SPRING_PROFILES_ACTIVE=prod 로 덮어쓰기)

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration

# Redis Streams 설정
redis:
  stream:
    key: order-stream
    consumer-group: order-group
    consumer-name: consumer-1

# Actuator — 헬스체크 및 Prometheus 메트릭
management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: start-java17

# 로그 설정은 logback-spring.xml에서 프로파일별로 관리
# - local/default : Spring Boot 기본 포맷 + traceId/spanId
# - dev/prod      : JSON 출력 (logstash-logback-encoder)
