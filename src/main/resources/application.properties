spring.redis.host=localhost
spring.redis.port=6379

# Redis Streams 설정
redis.stream.key=order-stream
redis.stream.consumer-group=order-group
redis.stream.consumer-name=consumer-1

# 로그 설정은 logback-spring.xml에서 프로파일별로 관리
# - local/default : Spring Boot 기본 포맷 + traceId/spanId
# - dev/prod      : JSON 출력 (logstash-logback-encoder)
