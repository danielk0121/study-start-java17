# ─────────────────────────────────────────
# MySQL DataSource
# ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/start_java17?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────
# local 개발: DDL 자동 생성 (create-drop → 앱 종료 시 테이블 삭제)
# 운영(prod): validate 또는 none 으로 변경할 것
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─────────────────────────────────────────
# Redis
# ─────────────────────────────────────────
spring.redis.host=localhost
spring.redis.port=6379

# Redis Streams 설정
redis.stream.key=order-stream
redis.stream.consumer-group=order-group
redis.stream.consumer-name=consumer-1

# ─────────────────────────────────────────
# 로그
# ─────────────────────────────────────────
# logback-spring.xml에서 프로파일별로 관리
# - local/default : Spring Boot 기본 포맷 + traceId/spanId
# - dev/prod      : JSON 출력 (logstash-logback-encoder)
