name: Deploy Multi-App to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'front-app/**'
      - 'frontbeta-app/**'
      - '.github/workflows/deploy-frontapp.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Build FrontApp 🏗️
        run: |
          cd front-app
          npm install
          npm run build -- --outDir dist/front

      - name: Install and Build FrontBetaApp 🎨
        run: |
          cd frontbeta-app
          npm install
          npm run build -- --outDir dist/frontbeta

      - name: Combine Artifacts 📦
        run: |
          mkdir -p build-dist
          cp -r front-app/dist/front build-dist/
          cp -r frontbeta-app/dist/frontbeta build-dist/
          # 루트 접속 시 front로 리다이렉트하는 간단한 index.html 추가
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=./front/"></head></html>' > build-dist/index.html

      - name: Add SPA 404 redirect support 🔄
        run: |
          # GitHub Pages SPA 새로고침 404 해결:
          # 1. 루트 404.html: 요청 경로를 query string에 담아 해당 앱의 index.html로 리다이렉트
          cat > build-dist/404.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Redirecting...</title>
            <script>
              (function() {
                var l = window.location;
                var path = l.pathname;
                var repoName = 'study-start-java17';
                
                // repoName 이후의 경로 추출 (예: /frontbeta/orders)
                var repoPath = '/' + repoName + '/';
                var pathAfterRepo = path.split(repoPath)[1] || '';
                
                // 앱 루트 판단 (frontbeta로 시작하면 frontbeta, 아니면 front)
                var isBeta = pathAfterRepo.startsWith('frontbeta');
                var appRoot = isBeta ? '/frontbeta/' : '/front/';
                
                var redirectTarget =
                  l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                  '/' + repoName + appRoot +
                  '?spaRedirect=' + encodeURIComponent(l.pathname + l.search) +
                  l.hash;
                l.replace(redirectTarget);
              })();
            </script>
          </head>
          <body></body>
          </html>
          HTMLEOF

          # 2. 각 앱의 index.html에 경로 복원 스크립트 주입 (</head> 직전)
          SPA_RESTORE_SCRIPT='<script>(function(){var p=new URLSearchParams(window.location.search).get("spaRedirect");if(p){window.history.replaceState(null,null,decodeURIComponent(p));}})()</script>'
          sed -i "s|</head>|${SPA_RESTORE_SCRIPT}</head>|" build-dist/front/index.html
          sed -i "s|</head>|${SPA_RESTORE_SCRIPT}</head>|" build-dist/frontbeta/index.html

      - name: Setup Pages 🌐
        uses: actions/configure-pages@v4

      - name: Upload artifact 📦
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build-dist'

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
