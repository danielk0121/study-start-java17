name: Deploy Multi-App to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'front-app/**'
      - 'frontbeta-app/**'
      - '.github/workflows/deploy-frontapp.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Build FrontApp 🏗️
        run: |
          cd front-app
          npm install
          npm run build -- --outDir dist/front

      - name: Install and Build FrontBetaApp 🎨
        run: |
          cd frontbeta-app
          npm install
          npm run build -- --outDir dist/frontbeta

      - name: Combine Artifacts 📦
        run: |
          mkdir -p build-dist
          cp -r front-app/dist/front build-dist/
          cp -r frontbeta-app/dist/frontbeta build-dist/
          # 루트 접속 시 front로 리다이렉트하는 간단한 index.html 추가
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=./front/"></head></html>' > build-dist/index.html

      - name: Setup Pages 🌐
        uses: actions/configure-pages@v4

      - name: Upload artifact 📦
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build-dist'

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
