version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: start-java17-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: start_java17
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0
    container_name: start-java17-redis
    volumes:
      - redis-data:/data

  db-migration:
    build: ./db-migration
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/start_java17
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234

  zipkin:
    image: openzipkin/zipkin:3
    container_name: start-java17-zipkin
    ports:
      - "9411:9411"

  member-service:
    build: ./member-service
    ports:
      - "8080:8080"
    depends_on:
      db-migration:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/start_java17
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_REDIS_HOST: redis
      SPRING_ZIPKIN_BASE_URL: http://zipkin:9411

  order-service:
    build: ./order-service
    ports:
      - "8081:8081"
    depends_on:
      db-migration:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/start_java17
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_REDIS_HOST: redis
      FEIGN_MEMBER_SERVICE_URL: http://member-service:8080
      SPRING_ZIPKIN_BASE_URL: http://zipkin:9411

  auth-service:
    build: ./auth-service
    ports:
      - "8082:8082"
    depends_on:
      db-migration:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/start_java17
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_ZIPKIN_BASE_URL: http://zipkin:9411

  bff:
    build: ./bff
    ports:
      - "8000:8000"
    depends_on:
      - member-service
      - order-service
    environment:
      FEIGN_MEMBER_SERVICE_URL: http://member-service:8080
      FEIGN_ORDER_SERVICE_URL: http://order-service:8081
      SPRING_ZIPKIN_BASE_URL: http://zipkin:9411

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - member-service
      - order-service
      - auth-service
      - bff

volumes:
  mysql-data:
  redis-data:
