apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app
          image: my-app:2.0
          imagePullPolicy: Never   # 로컬 이미지 사용 (외부에서 pull 안 함)
          command: ["java", "-jar", "app.jar"]
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30   # 앱 기동 대기
            periodSeconds: 10         # 10초마다 체크
            failureThreshold: 5       # 5회 실패 시 트래픽 차단
