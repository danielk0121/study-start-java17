openapi: 3.0.1
info:
  title: Order Service API
  description: 주문 관리 API 명세 (배송지 정보 포함)
  version: 0.0.2
servers:
- url: http://localhost:8081
paths:
  /orders:
    get:
      tags:
      - orders
      summary: 주문 목록 조회 (본인 또는 ADMIN 권한 필요)
      operationId: orders-find-all
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
    post:
      tags:
      - orders
      summary: 주문 생성 (BUYER 권한 필요)
      operationId: orders-place
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderPlaceRequest'
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
  /orders/{id}:
    get:
      tags:
      - orders
      operationId: orders-find-by-id
      parameters:
      - name: id
        in: path
        description: 주문 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
    delete:
      tags:
      - orders
      operationId: orders-delete
      parameters:
      - name: id
        in: path
        description: 주문 ID
        required: true
        schema:
          type: string
      responses:
        "204":
          description: "204"
  /orders/{id}/cancel:
    patch:
      tags:
      - orders
      operationId: orders-cancel
      parameters:
      - name: id
        in: path
        description: 주문 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
components:
  schemas:
    OrderResponse:
      type: object
      properties:
        id:
          type: number
        memberId:
          type: number
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: number
              quantity:
                type: number
        status:
          type: string
        shippingAddress:
          type: string
          description: 복사된 배송지 상세 주소
        shippingZipCode:
          type: string
          description: 복사된 배송지 우편번호
        createdAt:
          type: string
    OrderPlaceRequest:
      type: object
      properties:
        memberId:
          type: number
        addressId:
          type: number
          description: 선택한 배송지 ID
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: number
              quantity:
                type: number
