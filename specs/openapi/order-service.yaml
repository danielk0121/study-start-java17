openapi: 3.0.1
info:
  title: Order Service API
  description: 주문 관리 및 장바구니 관리 API 명세
  version: 0.0.3
servers:
- url: http://localhost:8081
paths:
  /orders:
    get:
      tags:
      - orders
      summary: 주문 목록 조회 (본인 또는 ADMIN 권한 필요)
      operationId: orders-find-all
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
    post:
      tags:
      - orders
      summary: 주문 생성 (BUYER 권한 필요)
      operationId: orders-place
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderPlaceRequest'
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
  /orders/{id}:
    get:
      tags:
      - orders
      operationId: orders-find-by-id
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
    delete:
      tags:
      - orders
      operationId: orders-delete
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: "204"
  /orders/{id}/cancel:
    patch:
      tags:
      - orders
      operationId: orders-cancel
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
  /carts/me:
    get:
      tags:
      - cart
      summary: 내 장바구니 조회 (BUYER 권한 필요)
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
    delete:
      tags:
      - cart
      summary: 장바구니 전체 비우기
      responses:
        "204":
          description: 성공
  /carts/me/items:
    post:
      tags:
      - cart
      summary: 장바구니 상품 추가
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemRequest'
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
  /carts/me/items/{productId}:
    patch:
      tags:
      - cart
      summary: 장바구니 상품 수량 수정
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
      responses:
        "200":
          description: 성공
    delete:
      tags:
      - cart
      summary: 장바구니 특정 상품 삭제
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
      responses:
        "204":
          description: 성공
components:
  schemas:
    OrderResponse:
      type: object
      properties:
        id:
          type: number
        memberId:
          type: number
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: number
              quantity:
                type: number
        status:
          type: string
        shippingAddress:
          type: string
        shippingZipCode:
          type: string
        createdAt:
          type: string
    OrderPlaceRequest:
      type: object
      properties:
        memberId:
          type: number
        addressId:
          type: number
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: number
              quantity:
                type: number
    CartItemRequest:
      type: object
      properties:
        productId:
          type: number
        quantity:
          type: integer
    CartResponse:
      type: object
      properties:
        memberId:
          type: number
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemDetail'
        totalPrice:
          type: number
    CartItemDetail:
      type: object
      properties:
        productId:
          type: number
        productName:
          type: string
        price:
          type: number
        quantity:
          type: integer
        itemTotal:
          type: number
