server:
  port: 8081

spring:
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: false

jwt:
  secret: study-start-java17-secret-key-for-jwt-token-generation

# Redis Streams 설정
redis:
  stream:
    key: order-stream
    consumer-group: order-group
    consumer-name: consumer-1

# FeignClient 설정
feign:
  member-service:
    url: http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, caches, metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: order-service
